<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Engine Viewer — Jailbreak Performance</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0d0f; --surface:#141417; --surface2:#1c1c21;
    --border:#2a2a32; --accent:#e8430a; --accent2:#ff6b35;
    --text:#e8e8ec; --muted:#888890; --green:#3dba72;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; height:100vh; height:100dvh; overflow:hidden; display:flex; flex-direction:column; }
  header {
    background:linear-gradient(180deg,#0a0a0c 0%,var(--bg) 100%);
    border-bottom:1px solid var(--border); padding:0 2.0rem;
    padding-top: env(safe-area-inset-top);
    display:flex; align-items:center; justify-content:space-between;
    height:88px; flex-shrink:0; z-index:10;
  }
  .header-right { display:flex; align-items:center; gap:1.12rem; }
  .back-btn {
    background:var(--surface2); border:1px solid var(--border); color:var(--muted);
    padding:0.61rem 1.12rem; border-radius:6px; font-family:'Barlow Condensed',sans-serif;
    font-size:1.04rem; font-weight:600; letter-spacing:0.05em; text-decoration:none; transition:all 0.2s;
  }
  .back-btn:hover { border-color:var(--accent); color:var(--accent); }
  .viewer-wrap { flex:1; display:flex; position:relative; overflow:hidden; }
  #canvas-container { flex:1; position:relative; }
  #three-canvas { display:block; width:100% !important; height:100% !important; touch-action:none; }
  #loader {
    position:absolute; inset:0; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:20; gap:1.5rem; transition:opacity 0.6s ease;
  }
  #loader.hidden { opacity:0; pointer-events:none; }
  .loader-pct { font-family:'Bebas Neue',sans-serif; font-size:3.0rem; color:var(--accent2); letter-spacing:0.05em; line-height:1; }
  .loader-bar-wrap { width:260px; height:3px; background:var(--surface2); border-radius:2px; overflow:hidden; }
  .loader-bar { height:100%; background:var(--accent); border-radius:2px; width:0%; transition:width 0.3s ease; }
  .loader-label { font-family:'Barlow Condensed',sans-serif; font-size:1.04rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); }
  #error-msg { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; gap:1.12rem; z-index:25; text-align:center; padding:2.0rem; }
  #error-msg.visible { display:flex; }
  .error-title { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; color:var(--accent); }
  .error-body { color:var(--muted); font-size:1.1rem; max-width:480px; line-height:1.6; }
  .error-code { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:0.92rem 1.4rem; font-family:monospace; font-size:0.98rem; color:var(--accent2); max-width:480px; word-break:break-all; }
  .info-panel {
    position:absolute; bottom:calc(7.5rem + env(safe-area-inset-bottom)); left:2.0rem;
    background:rgba(20,20,23,0.88); border:1px solid var(--border);
    border-radius:8px; padding:1.12rem 1.4rem; backdrop-filter:blur(8px); z-index:5;
  }
  .info-engine { font-family:'Bebas Neue',sans-serif; font-size:1.57rem; letter-spacing:0.08em; color:var(--text); line-height:1; }
  .info-sub { font-size:0.92rem; color:var(--muted); margin-top:0.34rem; font-family:'Barlow Condensed',sans-serif; letter-spacing:0.1em; text-transform:uppercase; }
  .controls-hint {
    position:absolute; bottom:calc(7.5rem + env(safe-area-inset-bottom)); right:2.0rem;
    background:rgba(20,20,23,0.88); border:1px solid var(--border);
    border-radius:8px; padding:0.92rem 1.12rem; backdrop-filter:blur(8px); z-index:5;
    font-family:'Barlow Condensed',sans-serif; font-size:0.97rem;
    color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; line-height:1.8;
  }
  .controls-hint span { color:var(--text); font-weight:600; }
  #anim-status {
    position:absolute; top:1.4rem; left:50%; transform:translateX(-50%);
    background:rgba(20,20,23,0.92); border:1px solid var(--border);
    border-radius:20px; padding:0.47rem 1.23rem;
    font-family:'Barlow Condensed',sans-serif; font-size:0.95rem;
    letter-spacing:0.15em; text-transform:uppercase; color:var(--muted);
    z-index:5; opacity:0; transition:opacity 0.3s ease; pointer-events:none; white-space:nowrap;
  }
  #anim-status.visible { opacity:1; }
  #control-bar {
    position:absolute; bottom:0; left:0; right:0; height:6.5rem;
    background:linear-gradient(0deg,rgba(13,13,15,0.98) 0%,rgba(13,13,15,0.85) 100%);
    border-top:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    z-index:8; padding:0 1.12rem;
    padding-bottom: env(safe-area-inset-bottom);
    /* bump height to absorb safe area without squishing buttons */
    min-height: calc(6.5rem + env(safe-area-inset-bottom));
  }
  #btn-remove {
    background:var(--accent); color:white; border:none;
    padding:0.98rem 2.2rem; border-radius:7px;
    font-family:'Bebas Neue',sans-serif; font-size:1.29rem; letter-spacing:0.12em;
    cursor:pointer; transition:all 0.2s; box-shadow:0 4px 20px rgba(232,67,10,0.3);
  }
  #btn-remove:hover:not(:disabled) { background:#ff5520; transform:translateY(-2px); box-shadow:0 8px 28px rgba(232,67,10,0.45); }
  #btn-remove:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
  #cam-selector { display:none; flex-direction:column; align-items:center; gap:0.68rem; width:100%; }
  #cam-selector.visible { display:flex; }
  #cam-name-display {
    font-family:'Barlow Condensed',sans-serif; font-size:1.12rem; font-weight:700;
    letter-spacing:0.12em; text-transform:uppercase; color:var(--accent2);
    text-align:center; min-height:1.46rem;
  }
  .selector-row { display:flex; align-items:center; gap:0.92rem; }
  .arrow-btn {
    background:var(--surface2); border:1px solid var(--border); color:var(--text);
    width:44px; height:44px; border-radius:6px; font-size:1.34rem; cursor:pointer;
    transition:all 0.18s; display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .arrow-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
  .arrow-btn:disabled { opacity:0.28; cursor:not-allowed; border-color:var(--border); color:var(--muted); }
  #btn-install {
    background:var(--green); color:#0d0d0f; border:none;
    padding:0.92rem 1.8rem; border-radius:7px;
    font-family:'Bebas Neue',sans-serif; font-size:1.18rem; letter-spacing:0.12em;
    cursor:pointer; transition:all 0.2s; box-shadow:0 4px 16px rgba(61,186,114,0.25);
  }
  #btn-install:hover:not(:disabled) { background:#4ed888; transform:translateY(-1px); }
  #btn-install:disabled { opacity:0.35; cursor:not-allowed; transform:none; }
</style>

<script>
// ── EARLY ERROR CAPTURE — fires before anything else ─────────────────────────
// Catches JS errors, promise rejections, and resource load failures.
// Writes directly to body so it shows even if our DOM isn't ready yet.
(function() {
  var errors = [];

  function showDebug(msg) {
    errors.push(msg);
    var box = document.getElementById('_dbg');
    if (!box) {
      box = document.createElement('div');
      box.id = '_dbg';
      box.style.cssText = [
        'position:fixed','top:0','left:0','right:0','z-index:99999',
        'background:#1a0000','color:#ff6b6b','font-family:monospace',
        'font-size:13px','padding:12px 14px','max-height:50vh',
        'overflow-y:auto','border-bottom:2px solid #ff0000',
        'white-space:pre-wrap','word-break:break-all'
      ].join(';');
      // append as early as possible — body may not exist yet
      var target = document.body || document.documentElement;
      if (target) target.insertBefore(box, target.firstChild);
      else document.addEventListener('DOMContentLoaded', function() {
        document.body.insertBefore(box, document.body.firstChild);
      });
    }
    box.textContent = '🚨 DEBUG ERRORS (' + errors.length + '):\n\n' + errors.join('\n\n');
  }

  window.onerror = function(msg, src, line, col, err) {
    showDebug('[JS ERROR]\n' + msg + '\nat ' + src + ':' + line + ':' + col +
              (err && err.stack ? '\n' + err.stack : ''));
    return false;
  };

  window.onunhandledrejection = function(e) {
    var reason = e.reason;
    showDebug('[PROMISE REJECTION]\n' +
              (reason && reason.stack ? reason.stack : String(reason)));
  };

  // Also catch failed script/resource loads
  window.addEventListener('error', function(e) {
    if (e.target && e.target !== window) {
      showDebug('[RESOURCE LOAD FAIL]\n' +
                (e.target.src || e.target.href || e.target.tagName));
    }
  }, true);
})();

// ── DOM ───────────────────────────────────────────────────────────────────────
const canvas      = document.getElementById('three-canvas');
const container   = document.getElementById('canvas-container');
const loaderEl    = document.getElementById('loader');
const loaderBar   = document.getElementById('loader-bar');
const loaderPct   = document.getElementById('loader-pct');
const errorMsg    = document.getElementById('error-msg');
const errorDetail = document.getElementById('error-detail');
const animStatus  = document.getElementById('anim-status');
const btnRemove   = document.getElementById('btn-remove');
const camSelector = document.getElementById('cam-selector');
const camNameDisp = document.getElementById('cam-name-display');
const btnLeft     = document.getElementById('btn-left');
const btnRight    = document.getElementById('btn-right');
const btnInstall  = document.getElementById('btn-install');

// ── CAM LIST ─────────────────────────────────────────────────────────────────
const CAM_LIST = [
  'Stock Camshaft','Comp Cams Stage 2 HRT',
  'MMX Chopstix NSR','Summit Stage 6 Blower','SDPC Stage 4'
];
let camIndex = 0;
function updateArrows() {
  btnLeft.disabled  = camIndex === 0;
  btnRight.disabled = camIndex === CAM_LIST.length - 1;
  camNameDisp.textContent = CAM_LIST[camIndex];
}

// ── RENDERER ─────────────────────────────────────────────────────────────────
// Detect iOS for conservative settings
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
              (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

let renderer;
try {
  renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: !isIOS,      // disable antialias on iOS to reduce GPU memory
    powerPreference: 'default',
    failIfMajorPerformanceCaveat: false,
  });
} catch(e) {
  errorDetail.textContent = 'WebGL context creation failed: ' + e.message;
  errorMsg.classList.add('visible');
  loaderEl.classList.add('hidden');
  throw e;
}

// Handle WebGL context loss (iOS memory pressure kills the context)
canvas.addEventListener('webglcontextlost', e => {
  e.preventDefault();
  errorDetail.textContent = 'WebGL context was lost — device may be low on GPU memory. Try closing other apps and reloading.';
  errorMsg.classList.add('visible');
  loaderEl.classList.add('hidden');
}, false);

renderer.setPixelRatio(Math.min(window.devicePixelRatio, isIOS ? 1.5 : 2));
renderer.shadowMap.enabled = !isIOS;  // disable shadows on iOS entirely
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

// ── SCENE & CAMERA ───────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d0f);
if (!isIOS) scene.fog = new THREE.Fog(0x0d0d0f, 10, 28);
const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 100);

// ── LIGHTING ─────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.35));
const keyLight = new THREE.DirectionalLight(0xfff0e0, 1.6);
keyLight.position.set(4,6,3);
keyLight.castShadow = !isIOS;
if (!isIOS) keyLight.shadow.mapSize.width = keyLight.shadow.mapSize.height = 1024;
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xd0e8ff, 0.5);
fillLight.position.set(-4,2,-2); scene.add(fillLight);
const rimLight = new THREE.DirectionalLight(0xff6030, 0.4);
rimLight.position.set(0,-1,-5); scene.add(rimLight);
scene.add(new THREE.HemisphereLight(0x1a1a2e,0x0d0d0f,0.3));
const frontFill = new THREE.DirectionalLight(0xfff8f0, 0.9);
frontFill.position.set(0,2.5,7); scene.add(frontFill);
const frontKicker = new THREE.DirectionalLight(0xd8eeff, 0.55);
frontKicker.position.set(2,-0.5,6); scene.add(frontKicker);

// ── ORBIT CONTROLS ───────────────────────────────────────────────────────────
let isDragging=false, isRightDrag=false, lastX=0, lastY=0;
let spherical = { theta:0.4, phi:1.25, radius:4.2 };
let orbitTarget = new THREE.Vector3(0,0.1,0);

function updateCamera() {
  const x=spherical.radius*Math.sin(spherical.phi)*Math.sin(spherical.theta);
  const y=spherical.radius*Math.cos(spherical.phi);
  const z=spherical.radius*Math.sin(spherical.phi)*Math.cos(spherical.theta);
  camera.position.set(orbitTarget.x+x,orbitTarget.y+y,orbitTarget.z+z);
  camera.lookAt(orbitTarget);
}

canvas.addEventListener('mousedown',e=>{ isDragging=true; isRightDrag=e.button===2; lastX=e.clientX; lastY=e.clientY; });
window.addEventListener('mouseup',()=>isDragging=false);
window.addEventListener('mousemove',e=>{
  if(!isDragging) return;
  const dx=(e.clientX-lastX)*0.005, dy=(e.clientY-lastY)*0.005;
  lastX=e.clientX; lastY=e.clientY;
  if(isRightDrag) {
    const right=new THREE.Vector3();
    camera.getWorldDirection(right); right.cross(camera.up).normalize();
    orbitTarget.addScaledVector(right,-dx*spherical.radius*0.5);
    orbitTarget.addScaledVector(camera.up,dy*spherical.radius*0.5);
  } else {
    spherical.theta-=dx;
    spherical.phi=Math.max(0.1,Math.min(Math.PI-0.1,spherical.phi-dy));
  }
  updateCamera();
});
canvas.addEventListener('wheel',e=>{
  spherical.radius=Math.max(0.8,Math.min(18,spherical.radius+e.deltaY*0.005));
  updateCamera();
},{passive:true});
canvas.addEventListener('contextmenu',e=>e.preventDefault());

let lastTouchX=0,lastTouchY=0,lastPinchDist=0;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){ lastTouchX=e.touches[0].clientX; lastTouchY=e.touches[0].clientY; }
  else if(e.touches.length===2) {
    const tdx=e.touches[0].clientX-e.touches[1].clientX;
    const tdy=e.touches[0].clientY-e.touches[1].clientY;
    lastPinchDist=Math.sqrt(tdx*tdx+tdy*tdy);
  }
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1) {
    const dx=(e.touches[0].clientX-lastTouchX)*0.005;
    const dy=(e.touches[0].clientY-lastTouchY)*0.005;
    lastTouchX=e.touches[0].clientX; lastTouchY=e.touches[0].clientY;
    spherical.theta-=dx;
    spherical.phi=Math.max(0.1,Math.min(Math.PI-0.1,spherical.phi-dy));
    updateCamera();
  } else if(e.touches.length===2) {
    const tdx=e.touches[0].clientX-e.touches[1].clientX;
    const tdy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(tdx*tdx+tdy*tdy);
    spherical.radius=Math.max(0.8,Math.min(18,spherical.radius+(lastPinchDist-dist)*0.008));
    lastPinchDist=dist; updateCamera();
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{ if(e.touches.length<2) lastPinchDist=0; },{passive:false});
updateCamera();

// ── RESIZE ───────────────────────────────────────────────────────────────────
function onResize() {
  const w=container.clientWidth,h=container.clientHeight;
  renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix();
}
window.addEventListener('resize',onResize);
onResize();

// ── TWEEN ENGINE ─────────────────────────────────────────────────────────────
const tweens=[];
function easeInOut(p) { return p<0.5?4*p*p*p:1-Math.pow(-2*p+2,3)/2; }

function tween(obj,props,dur,delay,onDone) {
  const start=performance.now()+(delay||0)*1000;
  const init={};
  for(const k in props) init[k]=obj[k];
  tweens.push({obj,props,init,start,dur:dur*1000,onDone,done:false});
}

function tweenOpacity(obj3d,from,to,dur,delay,onDone) {
  obj3d.traverse(child=>{
    if(child.isMesh&&child.material) {
      child.material.transparent=true;
      child.material.depthWrite=false;
      child.material.opacity=from;
    }
  });
  const proxy={v:from};
  tweens.push({
    obj:proxy, props:{v:to}, init:{v:from},
    start:performance.now()+(delay||0)*1000,
    dur:dur*1000, done:false, _opacityTarget:obj3d, _toVal:to, onDone
  });
}

function setOpacity(obj3d,val) {
  obj3d.traverse(child=>{
    if(child.isMesh&&child.material) {
      child.material.transparent=true;
      child.material.depthWrite=false;
      child.material.opacity=val;
    }
  });
}

function restoreOpaque(obj3d) {
  obj3d.traverse(child=>{
    if(child.isMesh&&child.material) {
      child.material.transparent=false;
      child.material.depthWrite=true;
      child.material.opacity=1;
    }
  });
}

function setVisible(obj3d,val) { obj3d.visible=val; }

function tickTweens(now) {
  for(const t of tweens) {
    if(t.done) continue;
    const elapsed=now-t.start;
    if(elapsed<0) continue;
    const p=Math.min(elapsed/t.dur,1);
    const e=easeInOut(p);
    for(const k in t.props) t.obj[k]=t.init[k]+(t.props[k]-t.init[k])*e;
    if(t._opacityTarget) {
      t._opacityTarget.traverse(child=>{
        if(child.isMesh&&child.material) child.material.opacity=t.obj.v;
      });
      if(p>=1&&t._toVal===1) restoreOpaque(t._opacityTarget);
    }
    if(p>=1) { t.done=true; if(t.onDone) t.onDone(); }
  }
  for(let i=tweens.length-1;i>=0;i--) { if(tweens[i].done) tweens.splice(i,1); }
}

// ── STATUS & UI ──────────────────────────────────────────────────────────────
function setStatus(msg) {
  animStatus.textContent=msg;
  animStatus.classList.toggle('visible',msg!=='');
}
function showState(state) {
  btnRemove.style.display   = state==='idle'     ? '' : 'none';
  camSelector.style.display = state==='selector' ? 'flex' : 'none';
}
function lockUI() {
  btnRemove.disabled=true; btnLeft.disabled=true;
  btnRight.disabled=true;  btnInstall.disabled=true;
}
function unlockSelector() { updateArrows(); btnInstall.disabled=false; }

// ── PART REFS & CONSTANTS ────────────────────────────────────────────────────
let parts={}, animRunning=false;
let camOrigin, coverOrigin, pulleyOrigin, waterPumpOrigin, fastenerOrigin;
let accessoryOrigins=[];

const PULL_Z=0.7, FLOAT_X=1.6;
const T_ACCESSORY=0.75, T_CAM_PULL=2.0, T_CAM_FLOAT=0.6;
const T_FADE=0.75, T_FASTENER=0.5, STAGGER=0.2;

// ── DISASSEMBLY ──────────────────────────────────────────────────────────────
function removeCam() {
  if(animRunning) return;
  animRunning=true; lockUI();
  setStatus('Disassembling...');

  const cam=parts.cam, cover=parts.timingCover, pulleys=parts.pulleys;
  const fasteners=parts.fasteners, accessories=parts.accessories, waterPump=parts.waterPump;

  // Fasteners fade immediately in place
  tweenOpacity(fasteners,1,0,T_FASTENER,0,null);

  // Pulleys — slide Z + fade
  tween(pulleys.position,{x:pulleyOrigin.x,y:pulleyOrigin.y,z:pulleyOrigin.z+PULL_Z},T_ACCESSORY,0,null);
  tweenOpacity(pulleys,1,0,T_FADE,0,null);

  // Accessories — 200ms later
  accessories.forEach(acc=>{
    const ori=accessoryOrigins.find(o=>o.name===acc.name);
    if(!ori) return;
    tween(acc.position,{x:ori.pos.x,y:ori.pos.y,z:ori.pos.z+PULL_Z},T_ACCESSORY,STAGGER,null);
    tweenOpacity(acc,1,0,T_FADE,STAGGER,null);
  });

  // Water pump + timing cover — 400ms later, together
  tween(waterPump.position,{x:waterPumpOrigin.x,y:waterPumpOrigin.y,z:waterPumpOrigin.z+PULL_Z},T_ACCESSORY,STAGGER*2,null);
  tweenOpacity(waterPump,1,0,T_FADE,STAGGER*2,null);
  tween(cover.position,{x:coverOrigin.x,y:coverOrigin.y,z:coverOrigin.z+PULL_Z},T_ACCESSORY,STAGGER*2,null);
  tweenOpacity(cover,1,0,T_FADE,STAGGER*2,()=>{
    setVisible(cover,false); accessories.forEach(a=>setVisible(a,false));
    setVisible(waterPump,false); setVisible(pulleys,false);

    setStatus('Removing camshaft...');

    // Cam slides out on Z — no rotation, no reparenting, ever
    tween(cam.position,{x:camOrigin.x,y:camOrigin.y,z:camOrigin.z+PULL_Z},T_CAM_PULL,0,()=>{
      setStatus('');
      animRunning=false;
      // Don't reset camIndex — remember whichever cam is installed
      updateArrows();
      showState('selector'); unlockSelector();
    });
  });
}

// ── CAM SWAP ─────────────────────────────────────────────────────────────────
function swapCam(direction) {
  if(animRunning) return;
  const newIndex=camIndex+direction;
  if(newIndex<0||newIndex>=CAM_LIST.length) return;
  animRunning=true; lockUI();
  doSwap(direction,newIndex);
}

function doSwap(direction,newIndex) {
  const cam=parts.cam;

  // Float position in parent-local space — same coords cam is sitting at
  const floatX = camOrigin.x;
  const floatY = camOrigin.y;
  const floatZ = camOrigin.z + PULL_Z;

  const exitX  = floatX + FLOAT_X * direction;
  const enterX = floatX - FLOAT_X * direction;

  // Get cam's actual world position and world scale so the clone
  // renders correctly when placed at scene root (not model root)
  const camWorldPos   = new THREE.Vector3();
  const camWorldQuat  = new THREE.Quaternion();
  const camWorldScale = new THREE.Vector3();
  cam.matrixWorld.decompose(camWorldPos, camWorldQuat, camWorldScale);

  // Clone outgoing cam — place it in world space so scale is correct
  const outgoing = cam.clone(true);
  outgoing.traverse(child=>{
    if(child.isMesh&&child.material) child.material=child.material.clone();
  });
  outgoing.position.copy(camWorldPos);
  outgoing.quaternion.copy(camWorldQuat);
  outgoing.scale.copy(camWorldScale);
  scene.add(outgoing);

  // Outgoing slides to exitX in world space and fades
  tween(outgoing.position,{x:exitX,y:camWorldPos.y,z:camWorldPos.z},T_CAM_FLOAT,0,null);
  tweenOpacity(outgoing,1,0,T_CAM_FLOAT,0,()=>scene.remove(outgoing));

  // Real cam enters from opposite side in parent-local space
  cam.position.set(enterX,floatY,floatZ);
  setOpacity(cam,0);

  // Slide in and fade in simultaneously
  tween(cam.position,{x:floatX,y:floatY,z:floatZ},T_CAM_FLOAT,0,null);
  tweenOpacity(cam,0,1,T_CAM_FLOAT,0,()=>{
    camIndex=newIndex;
    camNameDisp.textContent=CAM_LIST[camIndex];
    animRunning=false;
    unlockSelector();
  });
}

// ── INSTALL ──────────────────────────────────────────────────────────────────
function installCam() {
  if(animRunning) return;
  animRunning=true; lockUI();
  doInstall();
}

function doInstall() {
  setStatus('Installing '+CAM_LIST[camIndex]+'...');
  const cam=parts.cam;
  const cover=parts.timingCover, pulleys=parts.pulleys;
  const fasteners=parts.fasteners, accessories=parts.accessories, waterPump=parts.waterPump;

  // Cam slides straight back into block — no rotation changes ever
  tween(cam.position,{x:camOrigin.x,y:camOrigin.y,z:camOrigin.z},T_CAM_PULL,0,()=>{
    setStatus('Sealing engine...');

    // Timing cover + water pump first
    setVisible(cover,true);
    cover.position.set(coverOrigin.x,coverOrigin.y,coverOrigin.z+PULL_Z);
    setOpacity(cover,0);
    setVisible(waterPump,true);
    waterPump.position.set(waterPumpOrigin.x,waterPumpOrigin.y,waterPumpOrigin.z+PULL_Z);
    setOpacity(waterPump,0);

    tween(cover.position,{x:coverOrigin.x,y:coverOrigin.y,z:coverOrigin.z},T_ACCESSORY,0,null);
    tween(waterPump.position,{x:waterPumpOrigin.x,y:waterPumpOrigin.y,z:waterPumpOrigin.z},T_ACCESSORY,0,null);
    tweenOpacity(cover,0,1,T_FADE,0,null);
    tweenOpacity(waterPump,0,1,T_FADE,0,()=>{

      // Accessories
      accessories.forEach(acc=>{
        const ori=accessoryOrigins.find(o=>o.name===acc.name);
        if(!ori) return;
        setVisible(acc,true);
        acc.position.set(ori.pos.x,ori.pos.y,ori.pos.z+PULL_Z);
        setOpacity(acc,0);
        tween(acc.position,{x:ori.pos.x,y:ori.pos.y,z:ori.pos.z},T_ACCESSORY,STAGGER,null);
        tweenOpacity(acc,0,1,T_FADE,STAGGER,null);
      });

      // Pulleys
      setVisible(pulleys,true);
      pulleys.position.set(pulleyOrigin.x,pulleyOrigin.y,pulleyOrigin.z+PULL_Z);
      setOpacity(pulleys,0);
      tween(pulleys.position,{x:pulleyOrigin.x,y:pulleyOrigin.y,z:pulleyOrigin.z},T_ACCESSORY,STAGGER*2,null);
      tweenOpacity(pulleys,0,1,T_FADE,STAGGER*2,()=>{

        // Fasteners last
        setVisible(fasteners,true);
        setOpacity(fasteners,0);
        tweenOpacity(fasteners,0,1,T_FASTENER,STAGGER,()=>{
          setStatus('');
          animRunning=false;
          // camIndex stays as whatever was installed — remembered for next removal
          showState('idle');
          btnRemove.disabled=false;
        });
      });
    });
  });
}

// ── BUTTON WIRING ────────────────────────────────────────────────────────────
btnRemove.addEventListener('click',  removeCam);
btnLeft.addEventListener('click',    ()=>swapCam(-1));
btnRight.addEventListener('click',   ()=>swapCam(1));
btnInstall.addEventListener('click', installCam);

// ── LOAD MODEL ───────────────────────────────────────────────────────────────
// GLTFLoader is loaded as a static script tag — call directly, no injection needed
(function loadModel() {
  if (!THREE.GLTFLoader) {
    errorDetail.textContent = 'GLTFLoader did not load — check CDN connectivity.';
    errorMsg.classList.add('visible'); loaderEl.classList.add('hidden');
    return;
  }
  const gltfLoader = new THREE.GLTFLoader();
  const dracoLoader = new THREE.DRACOLoader();
  dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');
  gltfLoader.setDRACOLoader(dracoLoader);
  gltfLoader.load('6.2_cam_compressed.glb',
    gltf=>{
      const model=gltf.scene;
      const box=new THREE.Box3().setFromObject(model);
      const center=box.getCenter(new THREE.Vector3());
      const size=box.getSize(new THREE.Vector3());
      const scale=2.5/Math.max(size.x,size.y,size.z);
      model.scale.setScalar(scale);
      model.position.sub(center.multiplyScalar(scale));

      const scaledBox=new THREE.Box3().setFromObject(model);
      orbitTarget.copy(scaledBox.getCenter(new THREE.Vector3()));

      model.traverse(child=>{
        if(child.isMesh&&child.material) {
          child.material=child.material.clone();
          child.material.transparent=false;
          child.material.depthWrite=true;
          child.material.opacity=1;
          child.material.envMapIntensity=0.8;
          child.castShadow=true; child.receiveShadow=true;
        }
      });

      scene.add(model);
      updateCamera();

      function findPart(name) {
        let found=null;
        model.traverse(c=>{ if(c.name===name) found=c; });
        return found;
      }

      parts.cam         = findPart('HemiEngine_Camshaft');
      parts.timingCover = findPart('HemiEngine_TimingCover');
      parts.pulleys     = findPart('HemiEngine_Pulleys');
      parts.fasteners   = findPart('HemiEngine_Fasteners');
      parts.waterPump   = findPart('HemiEngine_WaterPump');
      const accNames=['HemiEngine_Accessories','HemiEngine_Accessories.001','HemiEngine_Accessories.002'];
      parts.accessories=accNames.map(n=>findPart(n)).filter(Boolean);

      console.log('Parts:');
      ['cam','timingCover','pulleys','fasteners','waterPump'].forEach(k=>
        console.log(' ',k,':',parts[k]?parts[k].name:'NOT FOUND'));
      console.log('  accessories:',parts.accessories.map(a=>a.name));

      // Store origins
      if(parts.cam)         camOrigin       = parts.cam.position.clone();
      if(parts.timingCover) coverOrigin     = parts.timingCover.position.clone();
      if(parts.pulleys)     pulleyOrigin    = parts.pulleys.position.clone();
      if(parts.fasteners)   fastenerOrigin  = parts.fasteners.position.clone();
      if(parts.waterPump)   waterPumpOrigin = parts.waterPump.position.clone();
      parts.accessories.forEach(a=>accessoryOrigins.push({name:a.name,pos:a.position.clone()}));

      if(parts.cam&&parts.timingCover) {
        btnRemove.disabled=false;
      } else {
        btnRemove.textContent='⚠ Parts not found — check console';
        btnRemove.disabled=false;
      }

      setTimeout(()=>loaderEl.classList.add('hidden'),300);
    },
    xhr=>{
      if(xhr.lengthComputable) {
        const pct=Math.round((xhr.loaded/xhr.total)*100);
        loaderBar.style.width=pct+'%'; loaderPct.textContent=pct+'%';
      }
    },
    err=>{
      console.error(err);
      errorDetail.textContent='Could not load 6.2_cam.glb — '+(err.message||'file not found');
      errorMsg.classList.add('visible'); loaderEl.classList.add('hidden');
    }
  );
})();

// ── RENDER LOOP ──────────────────────────────────────────────────────────────
let lastFrameTime=performance.now();
function animate() {
  requestAnimationFrame(animate);
  const now=performance.now();
  lastFrameTime=now;
  tickTweens(now);
  renderer.render(scene,camera);
}
lastFrameTime=performance.now();
animate();
showState('idle');
</script>
</body>
